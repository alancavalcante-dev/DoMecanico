services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: domecanico
      POSTGRES_USER: domecanico
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U domecanico"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - static_files:/app/staticfiles
    ports:
      - "127.0.0.1:8000:8000"
    command: >
      sh -c "mkdir -p logs &&
             python manage.py migrate --noinput &&
             gunicorn core.wsgi --worker-class gthread --workers 3 --threads 8 --bind 0.0.0.0:8000 --timeout 60"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  evolution:
    image: atendai/evolution-api:v1.8.3
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      STORE_MESSAGES: "false"
      STORE_MESSAGE_UP: "false"
      STORE_CONTACTS: "false"
      STORE_CHATS: "false"
      CLEAN_STORE_CLEANING_INTERVAL: "7200"
      CLEAN_STORE_MESSAGES: "true"
      CLEAN_STORE_MESSAGE_UP: "true"
      CLEAN_STORE_CONTACTS: "true"
      CLEAN_STORE_CHATS: "true"
      REDIS_ENABLED: "true"
      REDIS_URI: redis://redis:6379/1
      REDIS_PREFIX_KEY: evolution
      WEBHOOK_GLOBAL_ENABLED: "false"
      CONFIG_SESSION_PHONE_CLIENT: DoMecanico
      CONFIG_SESSION_PHONE_NAME: Chrome
      DEL_INSTANCE: "false"
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  static_files:
  evolution_instances:
  evolution_store:
